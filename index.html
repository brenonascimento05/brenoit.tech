<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Breno Nascimento | Serviços de TI em Natal/RN</title>

<meta name="description" content="Serviços de TI em Natal/RN. Formatação, montagem de PCs, reparos, instalação de software, redes e suporte técnico personalizado.">
<meta name="keywords" content="TI, informática, formatação, montagem de PC, suporte técnico, Natal RN">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
    --bg: #0a1a33;
    --bg-card: #102544;
    --text: #ffffff;
    --primary: #1e90ff;
    --primary-dark: #187bcd;
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: var(--bg);
    color: var(--text);
}

/* NAV */
nav {
    position: fixed;
    width: 100%;
    top: 0;
    background: var(--bg-card);
    padding: 15px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 1000;
}

.logo {
    font-family: 'Montserrat', sans-serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--primary);
}

.hamburger {
    display: none;
    flex-direction: column;
    cursor: pointer;
}

.hamburger span {
    width: 25px;
    height: 3px;
    background: white;
    margin: 4px 0;
    transition: .3s;
}

/* MENU */
.nav-links {
    display: flex;
    list-style: none;
    gap: 20px;
}

.nav-links a {
    color: white;
    text-decoration: none;
    padding: 8px 12px;
    border-radius: 4px;
}

.nav-links a:hover {
    background: rgba(30,144,255,.15);
    color: var(--primary);
}

/* MOBILE */
@media (max-width:768px){
    .hamburger { display:flex; }

    .nav-links {
        position: fixed;
        right: -100%;
        top: 0;
        height: 100vh;
        width: 250px;
        background: var(--bg-card);
        flex-direction: column;
        padding: 90px 30px;
        transition: .4s;
    }

    .nav-links.active {
        right: 0;
    }
}

/* HERO */
header {
    padding-top: 120px;
}

.hero-bg {
    max-width: 1200px;
    margin: auto;
    padding: 90px 20px;
    border-radius: 15px;
    background:
        linear-gradient(rgba(10,26,51,.9), rgba(10,26,51,.9)),
        url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=1200&q=80');
    background-size: cover;
}

.hero-bg h1 {
    font-family: 'Montserrat';
    font-size: 2.8rem;
    border-left: 4px solid var(--primary);
    padding-left: 15px;
}

.hero-bg p {
    max-width: 700px;
    font-size: 1.2rem;
}

/* MAIN */
main {
    max-width: 1000px;
    margin: 50px auto;
    background: var(--bg-card);
    padding: 40px;
    border-radius: 12px;
}

.servicos {
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(260px,1fr));
    gap: 25px;
}

.card {
    background: #1c2128;
    padding: 25px;
    border-radius: 12px;
    text-align: center;
    cursor: pointer;
    transition: .3s;
}

.card:hover {
    transform: translateY(-6px);
    border: 1px solid var(--primary);
}

.card.selecionado {
    border: 2px solid #25d366;
}

/* FORM */
input, textarea {
    width: 100%;
    padding: 14px;
    border-radius: 8px;
    border: 1px solid #2a3a5a;
    background: #1c2128;
    color: white;
}

button {
    background: var(--primary);
    padding: 15px;
    border: none;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
}

button:hover {
    background: var(--primary-dark);
}

/* WHATSAPP */
.whatsapp-btn {
    position: fixed;
    bottom: 25px;
    right: 25px;
    width: 60px;
    height: 60px;
    background: #25d366;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    font-size: 26px;
}
</style>
</head>

<body>

<nav>
    <div class="logo">Breno Nascimento</div>
    <div class="hamburger" id="hamburger" aria-label="Abrir menu">
        <span></span><span></span><span></span>
    </div>
    <ul class="nav-links" id="navLinks">
        <li><a href="#inicio">Início</a></li>
        <li><a href="#servicos">Serviços</a></li>
        <li><a href="#contato">Contato</a></li>
    </ul>
</nav>

<header id="inicio">
    <div class="hero-bg">
        <h1>Serviços de TI</h1>
        <p>Formatação, montagem de PCs, reparos, redes e suporte técnico personalizado em Natal/RN.</p>
    </div>
</header>

<main id="servicos">
    <h2>Serviços</h2>

    <div class="servicos">
        <div class="card" data-servico="formatacao"><i class="fas fa-desktop"></i><h3>Formatação</h3></div>
        <div class="card" data-servico="montagem"><i class="fas fa-toolbox"></i><h3>Montagem</h3></div>
        <div class="card" data-servico="reparos"><i class="fas fa-laptop-medical"></i><h3>Reparos</h3></div>
    </div>

    <h2 id="contato">Solicitar Atendimento</h2>

    <form id="formAtendimento">
        <input type="text" id="nome" placeholder="Nome" required>
        <input type="tel" id="telefone" placeholder="WhatsApp com DDD" required>
        <textarea id="descricao" placeholder="Descreva o serviço" required></textarea>
        <button type="submit"><i class="fab fa-whatsapp"></i> Enviar</button>
    </form>
</main>

<a class="whatsapp-btn" href="https://wa.me/5584994291197" target="_blank">
    <i class="fab fa-whatsapp"></i>
</a>

<script>
const hamburger = document.getElementById('hamburger');
const navLinks = document.getElementById('navLinks');

hamburger.onclick = () => {
    navLinks.classList.toggle('active');
};
</script>

</body>
</html>
